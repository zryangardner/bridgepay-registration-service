services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bridgepay_registration
      POSTGRES_USER: bridgepay_admin
      POSTGRES_PASSWORD: bridgepay_local
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
